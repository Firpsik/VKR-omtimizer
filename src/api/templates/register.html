<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Регистрация — АСМП-Маркет</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
</style>
</head>
<body class="bg-white min-h-screen flex flex-col">
  <header class="border-b border-gray-200 px-6 py-4">
    <h1 class="text-lg font-semibold tracking-tight">АСМП-Маркет</h1>
    <p class="text-xs text-gray-500">Аналитическая система мониторинга продаж на маркетплейсах</p>
  </header>

  <main class="flex-1 flex items-center justify-center px-4">
    <div class="w-full max-w-md">
      <div class="rounded-2xl ring-1 ring-gray-200 p-8 space-y-5">
        <div>
          <h2 class="text-xl font-semibold tracking-tight">Регистрация</h2>
          <p class="text-xs text-gray-500 mt-1">Создайте свой рабочий кабинет</p>
        </div>

        {% if error %}
        <div class="text-sm text-rose-700 bg-rose-50 ring-1 ring-rose-200 rounded-lg px-3 py-2">
          {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/register" class="space-y-4">
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Email</label>
            <input type="email" name="email" required autofocus
                   class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Имя (не обязательно)</label>
            <input type="text" name="display_name" placeholder="Иван"
                   class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Пароль (минимум 6 символов)</label>
            <input type="password" name="password" required minlength="6"
                   class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
          </div>
          <div>
            <label class="block text-xs font-medium text-gray-600 mb-1">Повторите пароль</label>
            <input type="password" name="password2" required minlength="6"
                   class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-indigo-200 focus:border-indigo-400">
          </div>
          <button type="submit"
                  class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-2 rounded-lg transition-colors text-sm">
            Создать аккаунт
          </button>
        </form>

        <div class="text-center text-sm">
          <span class="text-gray-500">Уже есть аккаунт?</span>
          <a href="/login" class="text-indigo-600 hover:text-indigo-800 font-medium">Войти</a>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
